name: Deploy Korean Law Chatbot to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "artifacts/korean-law-chatbot/**"
      - ".github/workflows/korean-law-chatbot-pages.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "artifacts/korean-law-chatbot/pnpm-lock.yaml"

      - name: Install dependencies
        working-directory: artifacts/korean-law-chatbot
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: artifacts/korean-law-chatbot
        run: pnpm run build
        env:
          NODE_ENV: production
          VITE_WORKER_URL: ${{ vars.VITE_WORKER_URL || 'https://korean-law-worker.neoulneoul.workers.dev' }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: "artifacts/korean-law-chatbot/dist/public"

      - id: deployment
        uses: actions/deploy-pages@v4
