kind = "web"
previewPath = "/"
title = "Korean Law Chatbot"
version = "1.0.0"
id = "artifacts/korean-law-chatbot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22957

[services.development]
run = "pnpm --filter @workspace/korean-law-chatbot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/korean-law-chatbot", "run", "build" ]
publicDir = "artifacts/korean-law-chatbot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22957"
BASE_PATH = "/"
